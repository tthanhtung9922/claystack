<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claystack — Design-First Development Studio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bisque:      #F5EDE0;
      --bone-ivory:  #FBF6EC;
      --studio-white:#FFFFFF;
      --graphite:    #1F1A16;
      --stoneware:   #5C524A;
      --silt:        #8E8378;
      --terracotta:  #C65F3C;
      --kiln-ember:  #A8472A;
      --slip:        #EADFCE;
      --fired-rim:   #D7C5AB;

      --font-serif: 'Fraunces', Georgia, serif;
      --font-sans:  'Geist', Inter, system-ui, sans-serif;
      --font-mono:  'Geist Mono', 'JetBrains Mono', ui-monospace, monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bisque);
      color: var(--graphite);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Navigation ──────────────────────────────────────────── */

    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 64px;
      background: rgba(245, 237, 224, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--slip);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: 100%;
      display: flex;
      align-items: center;
    }

    .nav-logo {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 500;
      color: var(--graphite);
      text-decoration: none;
      flex-shrink: 0;
      letter-spacing: -0.01em;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
      margin-left: 40px;
    }

    .nav-links a {
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 400;
      color: var(--stoneware);
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .nav-links a:hover { color: var(--graphite); }

    .nav-spacer { flex: 1; }

    .nav-cta {
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      color: var(--studio-white);
      background: var(--terracotta);
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      line-height: 1;
      transition: background 0.15s ease;
    }

    .nav-cta:hover { background: var(--kiln-ember); }

    .nav-cta:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(198, 95, 60, 0.25);
    }

    .nav-hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 40px;
      height: 40px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 10px;
      border-radius: 8px;
    }

    .nav-hamburger span {
      display: block;
      height: 1.5px;
      width: 100%;
      background: var(--graphite);
      border-radius: 1px;
    }

    /* ── Shared Buttons ──────────────────────────────────────── */

    .btn-primary {
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      color: var(--studio-white);
      background: var(--terracotta);
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      line-height: 1;
      transition: background 0.15s ease;
      min-height: 44px;
    }

    .btn-primary:hover { background: var(--kiln-ember); }

    .btn-primary:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(198, 95, 60, 0.25);
    }

    .btn-ghost {
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      color: var(--graphite);
      background: transparent;
      border: 1px solid var(--slip);
      border-radius: 8px;
      padding: 10px 20px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      line-height: 1;
      transition: background 0.15s ease, border-color 0.15s ease;
      min-height: 44px;
    }

    .btn-ghost:hover {
      background: var(--bisque);
      border-color: var(--fired-rim);
    }

    .btn-ghost:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(198, 95, 60, 0.25);
    }

    /* ── Hero ────────────────────────────────────────────────── */

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero {
      background: var(--bisque);
      padding-top: 128px;
    }

    .hero-inner {
      max-width: 1040px;
      margin: 0 auto;
      padding: 0 24px 128px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .hero-overline {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 400;
      color: var(--silt);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.60;
      display: block;
      animation: fadeUp 0.55s ease both;
      animation-delay: 0.05s;
    }

    .hero-rule {
      width: 240px;
      height: 1px;
      background: var(--fired-rim);
      margin: 16px 0;
      animation: fadeUp 0.55s ease both;
      animation-delay: 0.12s;
    }

    .hero-headline {
      font-family: var(--font-serif);
      font-size: 64px;
      font-weight: 500;
      color: var(--graphite);
      line-height: 1.10;
      letter-spacing: -0.015em;
      max-width: 880px;
      margin-bottom: 32px;
      animation: fadeUp 0.65s ease both;
      animation-delay: 0.22s;
    }

    .kiln-word {
      background: linear-gradient(135deg, #C65F3C 0%, #E89A6B 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-lead {
      font-family: var(--font-sans);
      font-size: 20px;
      font-weight: 400;
      color: var(--stoneware);
      line-height: 1.55;
      max-width: 640px;
      margin-bottom: 32px;
      animation: fadeUp 0.65s ease both;
      animation-delay: 0.36s;
    }

    .hero-cta {
      display: flex;
      align-items: center;
      gap: 12px;
      animation: fadeUp 0.65s ease both;
      animation-delay: 0.50s;
    }

    /* ── Strata Divider ──────────────────────────────────────── */

    .strata-divider {
      display: flex;
      flex-direction: column;
      gap: 2px;
      width: 100%;
    }

    .strata-line           { height: 1px; width: 100%; }
    .strata-line--slip     { background: #EADFCE; }
    .strata-line--fired    { background: #D7C5AB; }
    .strata-line--kiln     { background: rgba(198, 95, 60, 0.30); }

    /* ── Responsive ──────────────────────────────────────────── */

    @media (max-width: 768px) {
      .nav-links,
      .nav-cta      { display: none; }
      .nav-hamburger { display: flex; }

      .hero          { padding-top: 64px; }
      .hero-inner    { padding-bottom: 64px; }
      .hero-headline { font-size: 48px; }
    }

    @media (max-width: 480px) {
      .hero          { padding-top: 48px; }
      .hero-inner    { padding-bottom: 48px; }
      .hero-headline { font-size: 36px; }
      .hero-lead     { font-size: 18px; }

      .hero-cta {
        flex-direction: column;
        width: 100%;
      }

      .hero-cta .btn-primary,
      .hero-cta .btn-ghost {
        width: 100%;
        justify-content: center;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .hero-overline,
      .hero-rule,
      .hero-headline,
      .hero-lead,
      .hero-cta { animation: none; }
    }
  </style>
</head>
<body>

  <header class="nav" role="banner">
    <div class="nav-inner">
      <a href="#" class="nav-logo">claystack</a>
      <ul class="nav-links" role="list">
        <li><a href="#">Work</a></li>
        <li><a href="#">Process</a></li>
        <li><a href="#">About</a></li>
      </ul>
      <div class="nav-spacer" aria-hidden="true"></div>
      <a href="#" class="nav-cta">Get in touch</a>
      <button class="nav-hamburger" aria-label="Open navigation menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <main>
    <section class="hero" aria-label="Hero">
      <div class="hero-inner">

        <span class="hero-overline">STACK 01 · HERO</span>
        <div class="hero-rule" role="presentation" aria-hidden="true"></div>

        <h1 class="hero-headline">
          Where <span class="kiln-word">raw</span> ideas become load-bearing code.
        </h1>

        <p class="hero-lead">
          Claystack is a design-first development studio — where warm craft
          and engineered systems live on the same canvas.
        </p>

        <div class="hero-cta">
          <a href="#" class="btn-primary">Start Building</a>
          <a href="#" class="btn-ghost">See the work →</a>
        </div>

      </div>

      <div class="strata-divider" role="presentation" aria-hidden="true">
        <div class="strata-line strata-line--slip"></div>
        <div class="strata-line strata-line--fired"></div>
        <div class="strata-line strata-line--kiln"></div>
      </div>
    </section>
  </main>

</body>
</html>
